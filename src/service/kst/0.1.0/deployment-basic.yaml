---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  labels:
    app: "service-basic"
  name: "service-basic"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: "service-basic"
  strategy: {}
  template:
    metadata:
      labels:
        app: "service-basic"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 6464
      containers:
        - image: "hashicorp/http-echo"
          name: "http-echo"
          resources:
            requests:
              cpu: "10m"
              memory: "24Mi"
            limits:
              cpu: "20m"
              memory: "32Mi"
          securityContext:
            readOnlyRootFilesystem: true
          args:
            - "-text=hello-world"
            - "-listen=:8080"
            - "-status-code=200"
          ports:
            - containerPort: 8080
              name: "http"
...
