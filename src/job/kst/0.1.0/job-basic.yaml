---
apiVersion: "batch/v1"
kind: "Job"
metadata:
  name: job-basic
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 6464
      restartPolicy: "Never"
      containers:
        - image: "busybox:latest"
          name: "busybox"
          resources:
            requests:
              cpu: "10m"
              memory: "24Mi"
            limits:
              cpu: "20m"
              memory: "32Mi"
          securityContext:
            readOnlyRootFilesystem: true
          command:
            - "/bin/sh"
            - "-c"
            - "while true; do echo 'hello world'; sleep 10; done"
...
